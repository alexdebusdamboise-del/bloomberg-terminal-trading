# One-click deploy on Render (https://render.com) — runs the Python server as-is.
# In Render: New + → Blueprint → connect this GitHub repo → Apply.
services:
  - type: web
    name: bloomberg-terminal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py --host 0.0.0.0
    autoDeploy: true
    envVars:
      # Twelve Data key -> charts, fundamentals, analyst forecasts, stock sparklines.
      - key: TWELVEDATA_API_KEY
        sync: false
      # Finnhub key -> real-time US stocks / indices / commodities WebSocket.
      - key: FINNHUB_API_KEY
        sync: false
      # Free CoinGecko "Demo" key -> reliable crypto data from datacenter IPs (optional).
      - key: COINGECKO_API_KEY
        sync: false
